<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var! 🎀</title>
    <style>
        body {
            background-color: #ffeaf2; /* Hello Kitty pembesi */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #d63384;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px solid #ffb6c1;
            max-width: 80%;
        }

        img {
            width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .heart {
            color: #ff0000;
            font-size: 30px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/en/0/05/Hello_kitty_character_portrait.png" alt="Hello Kitty">
        
        <h1>Selam! ✨</h1>
        <p>Bu anahtarlığı okuttuysan, benim için çok değerlisin demektir.</p>
        <p>Senin için hazırladığım bu minik sürprizi umarım beğenirsin!</p>
        
        <div class="heart">❤</div>
    </div>

</body>
</html>
